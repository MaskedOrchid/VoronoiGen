name: Pylint

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pylint PySide6 pandas shapely pylint-pyside6
      - run: pylint --rcfile=.github/workflows/.pylintrc $(git ls-files '*.py')
